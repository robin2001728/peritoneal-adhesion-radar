name: Update Literature and Deploy Site

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "data/articles.json"
  schedule:
    # 06:10 China Standard Time every day.
    - cron: "10 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Retrieve recent PubMed records
        env:
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python scripts/fetch_pubmed.py --limit 120

      - name: Save updated literature data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git diff --cached --quiet || git commit -m "Update PubMed literature data"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static website
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
